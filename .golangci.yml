run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gofmt

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (*bufio.Writer).Flush
      - os.Remove
      - os.RemoveAll
      - fmt.Fprint
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Sscan
      - fmt.Sscanf
      - (net/http.ResponseWriter).Write
      - (io.Writer).Write

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - ineffassign
        - staticcheck
    - path: cmd/cloudy/
      text: "Error return value of `sess.Close`"
      linters:
        - errcheck
