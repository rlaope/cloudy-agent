name: release

# Fires when an annotated tag matching v*.*.* (e.g. v0.4.1) is pushed.
# Builds one static binary per supported (os, arch) pair and attaches
# them all to a single GitHub release named after the tag. install.sh
# then resolves "latest" via the GitHub API and downloads whichever
# asset matches the operator's `uname` output.
#
# To cut a release:
#   git tag -a v0.4.1 -m "v0.4.1"
#   git push origin v0.4.1
#
# Within ~3 minutes the new binaries are live at
# https://github.com/rlaope/cloudy-agent/releases/latest and the curl
# installer one-liner picks them up automatically.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/rlaope/cloudy/internal/buildinfo.Version=${{ github.ref_name }}" \
            -o dist/cloudy-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd

      - name: checksum
        run: |
          cd dist
          shasum -a 256 cloudy-${{ matrix.goos }}-${{ matrix.goarch }} \
            > cloudy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gather artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list assets
        run: ls -la dist/

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/cloudy-*
